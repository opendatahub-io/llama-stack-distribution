name: "Responses: Vertex AI"

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  IMAGE_NAME: quay.io/opendatahub/llama-stack
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
  EMBEDDING_MODEL: openai/text-embedding-3-small
  EMBEDDING_PROVIDER: openai
  EMBEDDING_PROVIDER_MODEL_ID: text-embedding-3-small
  PROVIDER_NAME: vertexai

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        model:
          - vertexai/publishers/google/models/gemini-2.0-flash
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      checks: write

    env:
      VERTEX_AI_PROJECT: ${{ secrets.VERTEX_AI_PROJECT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: 3.12
          enable-cache: false

      - name: Derive model short name
        id: model
        run: |
          SHORT=$(echo "${{ matrix.model }}" | sed 's|.*/||')
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.VERTEX_AI_PROJECT }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Check credentials
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$VERTEX_AI_PROJECT" ] || [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ] || [ ! -f "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "::error::Vertex AI credentials not available"
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY not configured (required for embeddings)"
            exit 1
          fi

      - name: Setup PostgreSQL
        uses: ./.github/actions/setup-postgres

      - name: Setup LLS
        uses: ./.github/actions/setup-lls
        with:
          image_name: ${{ env.IMAGE_NAME }}
          image_tag: ${{ env.IMAGE_TAG }}
          embedding_model: ${{ env.EMBEDDING_MODEL }}
          embedding_provider: ${{ env.EMBEDDING_PROVIDER }}
          embedding_provider_model_id: ${{ env.EMBEDDING_PROVIDER_MODEL_ID }}
          extra_env: |
            VERTEX_AI_PROJECT=${{ env.VERTEX_AI_PROJECT }}
            GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-credentials
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          volumes: |
            ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}:/run/secrets/gcp-credentials:ro

      - name: Clone upstream tests
        shell: bash
        run: |
          CONTAINERFILE="distribution/Containerfile"
          GIT_URL=$(grep -o 'git+https://github\.com/[^/]\+/llama-stack\.git@v\?[0-9.+a-z]\+' "$CONTAINERFILE")
          if [ -z "$GIT_URL" ]; then
            echo "::error::Could not extract llama-stack git URL from $CONTAINERFILE"
            exit 1
          fi
          REPO_URL=${GIT_URL#git+}; REPO_URL=${REPO_URL%%@*}
          VERSION=${GIT_URL##*@}; VERSION=${VERSION#v}

          git clone "$REPO_URL" /tmp/llama-stack-tests
          cd /tmp/llama-stack-tests
          if [ "$VERSION" == "main" ]; then
            git checkout main
          else
            git checkout "v$VERSION"
          fi

          uv venv --clear
          source .venv/bin/activate
          uv pip install llama-stack-client ollama

      - name: Run responses tests
        shell: bash
        run: |
          cd /tmp/llama-stack-tests
          source .venv/bin/activate
          mkdir -p /tmp/test-results

          set +e
          uv run pytest -s -v tests/integration/responses/ \
            --stack-config=server:"$GITHUB_WORKSPACE/distribution/config.yaml" \
            --text-model="${{ matrix.model }}" \
            --embedding-model="$EMBEDDING_MODEL" \
            --junit-xml="/tmp/test-results/results-${PROVIDER_NAME}-${{ steps.model.outputs.short }}.xml"
          rc=$?
          set -e
          if [ $rc -ne 0 ] && [ $rc -ne 1 ] && [ $rc -ne 5 ]; then exit $rc; fi

          set +e
          uv run pytest -s -v tests/integration/inference/ \
            --stack-config=server:"$GITHUB_WORKSPACE/distribution/config.yaml" \
            --text-model="${{ matrix.model }}" \
            --embedding-model="$EMBEDDING_MODEL" \
            --junit-xml="/tmp/test-results/results-inference-${PROVIDER_NAME}-${{ steps.model.outputs.short }}.xml"
          rc=$?
          set -e
          if [ $rc -ne 0 ] && [ $rc -ne 1 ] && [ $rc -ne 5 ]; then exit $rc; fi

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        with:
          name: "${{ env.PROVIDER_NAME }} — ${{ steps.model.outputs.short }}"
          path: /tmp/test-results/*.xml
          reporter: java-junit

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: responses-${{ env.PROVIDER_NAME }}-${{ steps.model.outputs.short }}
          path: /tmp/test-results/
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          for c in llama-stack postgres; do
            docker rm -f "$c" 2>/dev/null || true
          done
